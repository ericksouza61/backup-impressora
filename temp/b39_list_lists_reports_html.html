win = window;
function OpenWindow(url, width, height)
{
var app = navigator.appName.charAt(0);
var ver = navigator.appVersion.charAt(0);
var date = new Date();

if ( url.indexOf("?") == -1 )
{
url += "?";
}
else
{
url += "&";
}
url = url + "did=" + date.getTime();
if ((app != "M") || (ver > "3"))
{
if ((win != window) && (! win.closed))
{
win.close();
}
}
win = open(url, "OpenWindow", "width="+width+",height="+height+",toolbar=no,location=no,directories=no,status=no,menubar=no,scrollbars=yes,resizable=yes");
if (ver >= "4")
{
win.focus();
}
return false;
}
function OpenConfirmWindow(url)
{
OpenWindow(url, "300", "200");
return false;
}
function OpenInfoWindow(url)
{
OpenWindow(url, "250", "80");
return false;
}
function OpenAlertWindow(url)
{
OpenWindow(url, "400", "150");
return false;
}
function OpenSignalWindow(url)
{
OpenWindow(url, "450", "120");
return false;
}
function OpenHelpWindow(url)
{
OpenWindow(url, "400", "400");
return false;
}
function OpenDataWindow(url)
{
OpenWindow(url, "400", "400");
return false;
}
function OpenLcdWindow(url)
{
OpenWindow(url, "450", "200");
return false;
}
